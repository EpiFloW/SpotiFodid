<div (click)="play()"
     (mouseover)="onHoverPlay(true)"
     (mouseleave)="onHoverPlay(false)">
  <div class="card-body">
    <img [src]="song().youtubeVideoId ? song().cover : 'data:' + song().coverContentType + ';base64,' + song().cover" 
     class="card-img-top" 
     alt="Cover">
    <h5 class="title mt-3">{{ song().title?.value }}</h5>
    <p class="author">{{ song().author?.value }}</p>
  </div>
  @if (songDisplay.displayPlay) {
    <div class="play position-absolute d-flex align-items-center" [@inOutAnimation]>
      <fa-icon class="text-primary" [icon]="'circle-play'"></fa-icon>
    </div>
  }
</div>
